<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exemplo de Formulário com JavaScript</title>
<script src="script.js" defer></script>
</head>

<body>
    <h1>Calculadora de Parcelas com Juros</h1>
    <form id="numeroForm">
    <label for="numero">Valor Total da Compra(R$):</label>
    <input type="number" id="valorTotal" name="valorTotal"  step="0.01" required>

    <label for="numero">Número de Parcelas:</label>
    <input type="number" id="parcelas" name="parcelas" min="1" required>

    <label for="numero">Taxa de Juros Mensal (%):</label>
    <input type="number" id="juros" name="jurosS" step="0.01" required>

    <button type="submit">Calcular</button>
</form>
<h1>Resultado:</h1>
<p>Valor de cada parcela: R$ <span id="resultado"></span></p>
<p>Valor total a ser pago: R$ <span id="resultado"></span></p>

</body>
</html>
