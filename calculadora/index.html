<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Operações</title>

  <!-- Conecta o JS externo -->
  <script src="script1.js" defer></script>

  <!-- Opcional: Bootstrap para estilo -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <div class="card mx-auto" style="max-width: 400px;">
      <div class="card-body">
        <h1 class="card-title text-center">Calculadora</h1>

        <form id="numeroForm">
          <div class="mb-3">
            <label for="numero" class="form-label">Digite um número:</label>
            <input type="number" id="numero" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="operacao" class="form-label">Escolha a operação:</label>
            <select id="operacao" class="form-select">
              <option value="quadrado">Quadrado</option>
              <option value="cubo">Cubo</option>
              <option value="raiz">Raiz Quadrada</option>
            </select>
          </div>

          <button type="submit" class="btn btn-success w-100">Calcular</button>
        </form>

        <h5 class="mt-3">Resultados:</h5>
        <ul id="listaResultados" class="list-group list-group-flush"></ul>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (opcional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
