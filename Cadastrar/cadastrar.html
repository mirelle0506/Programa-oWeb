<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Vendas</title>
<link rel="stylesheet" href="vetor.css">
</head>

<body>

<div class="container">
    <h1>Finalizando venda</h1>

    <div class="form-group">
        <label>Nome do Vendedor:</label>
        <input type="text" id="nome" placeholder="Nome do Vendedor">

        <label>Valor da Venda:</label>
        <input type="number" id="valor" placeholder="Valor da Venda">
    </div>

    <div class="button-group">
        <button class="btn-adicionar" onclick="cadastrar()">Cadastrar</button>
    </div>

    <h2 id="lista">Lista de Vendas</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Vendedor</th>
                <th>Valor</th>
                <th>Desconto</th>
                <th>Valor Final</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

</div>

<script src="vetor.js"></script>

</body>
</html>
